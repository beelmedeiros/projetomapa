<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rota de Entregas</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
}

#map{
    top: 130px;
    height:100vh;
}

.painel{
    position:absolute;
    top:150px;
    left:50%;
    transform:translateX(-50%);
    z-index:1000;
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.3);
    width:450px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
}

button{
    padding:10px;
    cursor:pointer;
    margin-right:5px;
}

.delete-btn{
  background:#e74c3c;
  color:#fff;
  border:none;
  padding:5px 8px;
  border-radius:6px;
  cursor:pointer;
  margin-left:8px;
}

#lista{
    top: 100px;
    max-height:150px;
    overflow:auto;
}

.voltarr{
    background:#3498db;
    color:#fff;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}

.voltarr a{
    color:#fff;
    text-decoration:none;}

.imgLOGO {
  width: 100px;
  height: 100px;
  border-radius: 50%;
}
</style>
</head>
<body>
<nav class="navbar bg-body-tertiary fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="#"><img src="../img/logo.jpeg" alt="Logo" class="imgLOGO"></a>
    
    <button class="voltarr"><a href="../index.html">Voltar ao inicio</a></button>
  </div>
</nav>
<div class="painel">

    

    <input
        type="text"
        id="destino"
        placeholder="Digite um endereço"
    >

    <button onclick="adicionarParada()">
        Adicionar Parada
    </button>

    <button onclick="calcularRota()">
        Calcular Entregas
    </button>

    <div id="lista"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>

const map = L.map("map").setView([-22.90,-43.20],12);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

let minhaPosicao = null;
let rota = null;

const destinos = [];

navigator.geolocation.watchPosition((pos)=>{

    minhaPosicao = L.latLng(
        pos.coords.latitude,
        pos.coords.longitude
    );

});

async function adicionarParada(){

    const endereco =
    document.getElementById("destino").value;

    if(!endereco) return;

    const resposta = await fetch(
        `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(endereco)}`
    );

    const dados = await resposta.json();

    if(dados.length === 0){
        alert("Endereço não encontrado");
        return;
    }

    destinos.push({
        nome:endereco,
        lat:parseFloat(dados[0].lat),
        lng:parseFloat(dados[0].lon)
    });

    atualizarLista();

    document.getElementById("destino").value = "";
}

function atualizarLista(){

    const lista =
    document.getElementById("lista");

    lista.innerHTML = "";

    destinos.forEach((item,index)=>{

    lista.innerHTML += `
      <div class="d-flex align-items-center mb-2">
        <div>${index+1}. ${item.nome}</div>
        <button class="delete-btn" onclick="removerParada(${index})" aria-label="Remover parada ${index+1}">Excluir</button>
      </div>
    `;

    });

}

function removerParada(index){
  if(index < 0 || index >= destinos.length) return;
  destinos.splice(index,1);
  atualizarLista();

  // Se houver rota exibida, atualiza-a para refletir a exclusão
  if(rota){
    map.removeControl(rota);
    rota = null;
    // tenta recalcular se posicionamento do usuário estiver disponível
    if(minhaPosicao){
      calcularRota();
    }
  }
}

function calcularRota(){

    if(!minhaPosicao){
        alert("Aguardando GPS");
        return;
    }

    const waypoints = [
        minhaPosicao
    ];

    destinos.forEach(destino=>{

        waypoints.push(
            L.latLng(
                destino.lat,
                destino.lng
            )
        );

    });

    if(rota){
        map.removeControl(rota);
    }

    rota = L.Routing.control({

        waypoints: waypoints,

        routeWhileDragging:false,

        addWaypoints:false,

        draggableWaypoints:false,

        router: L.Routing.osrmv1({
            serviceUrl:
            "https://router.project-osrm.org/route/v1"
        })

    }).addTo(map);

}

</script>

</body>
</html>
