<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu Perfil</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #eef2ff, #f8fafc);
        color: #1f2937;
      }

      .profile-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .profile-card {
        width: min(100%, 560px);
        background: white;
        border-radius: 16px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
        padding: 28px;
      }

      h1 {
        margin-top: 0;
        margin-bottom: 8px;
        font-size: 28px;
      }

      .subtitle {
        margin-bottom: 20px;
        color: #4b5563;
      }

      .info-item {
        margin-bottom: 10px;
        padding: 10px 0;
        border-bottom: 1px solid #e5e7eb;
      }

      .info-item strong {
        color: #111827;
      }

      .logout-btn {
        margin-top: 20px;
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #2563eb;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      .logout-btn:hover {
        background: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <main class="profile-container">
      <section class="profile-card">
        <h1>Meu Perfil</h1>
        <p class="subtitle">
          Estas são as informações cadastradas na sua conta.
        </p>

        <div id="profile-info"></div>
        <button class="logout-btn" onclick="window.location.href='./index.html'">Voltar</button>
        <button id="logout-btn" class="logout-btn">Sair da conta</button>
      </section>
    </main>

    <script>
      const loggedUser = JSON.parse(localStorage.getItem("loggedInUser"));
      const profileInfo = document.getElementById("profile-info");

      if (!loggedUser) {
        window.location.href = "../menu.html";
      } else {
        const userFields = [
          { label: "Usuário", value: loggedUser.username || "Não informado" },
          {
            label: "Nome completo",
            value: loggedUser.fullName || "Não informado",
          },
          { label: "CPF", value: loggedUser.cpf || "Não informado" },
          { label: "CEP", value: loggedUser.cep || "Não informado" },
          { label: "Endereço", value: loggedUser.address || "Não informado" },
          { label: "UF", value: loggedUser.uf || "Não informado" },
          { label: "Bairro", value: loggedUser.bairro || "Não informado" },
          {
            label: "Complemento",
            value: loggedUser.complemento || "Não informado",
          },
          { label: "Número", value: loggedUser.numero || "Não informado" },
          { label: "Valor Mensal", value: loggedUser.valorMensal || "Não informado" },
          { label: "Plano", value: loggedUser.plano || "Não informado" },
          { label: "Forma de Pagamento", value: loggedUser.formaPagamento || "Não informado" },
          { label: "Data de Solicitação", value: loggedUser.dataSolicitacao || "Não informado" },
        ];

        profileInfo.innerHTML = userFields
          .map(
            (field) => `
              <div class="info-item">
                <strong>${field.label}:</strong> ${field.value}
              </div>
            `
          )
          .join("");
      }

      document.getElementById("logout-btn").addEventListener("click", () => {
        localStorage.removeItem("loggedInUser");
        window.location.href = "./menu.html";
      });
    </script>
    <script src="./js/theme.js"></script>
  </body>
</html>
